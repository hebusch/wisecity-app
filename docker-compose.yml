services:
  gps:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DB_PATH: /app/data/gps.duckdb
      WEBAUTHN_RP_ID: localhost
      WEBAUTHN_ORIGIN: http://localhost:8000
    volumes:
      - gps-data:/app/data
    restart: unless-stopped

volumes:
  gps-data:
